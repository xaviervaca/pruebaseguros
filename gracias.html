<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por tu confianza | Xavier Vaca Alvarez</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1b4332;
            --accent-green: #2d6a4f;
            --light-bg: #f8faf8;
            --white: #ffffff;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--light-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .card { 
            background: var(--white); 
            padding: 50px; 
            border-radius: 15px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            max-width: 500px;
        }
        h1 { 
            font-family: 'Playfair Display', serif; 
            color: var(--primary-green); 
            font-size: 2.2rem; 
            margin-bottom: 20px;
        }
        p { color: #555; font-size: 1.1rem; line-height: 1.6; }
        .check-icon { 
            font-size: 50px; 
            color: var(--accent-green); 
            margin-bottom: 20px; 
        }
        .btn-back {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: var(--accent-green);
            font-weight: 600;
            border-bottom: 2px solid var(--accent-green);
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--primary-green); border-color: var(--primary-green); }
    </style>
</head>
<body>
    <div class="card">
        <div class="check-icon">✓</div>
        <h1>¡Gracias por la confianza!</h1>
        <p>Tu solicitud ha sido recibida con éxito. En un momento, Xavier Vaca Alvarez se pondrá en contacto contigo para brindarte una asesoría premium.</p>
        <a href="index.html" class="btn-back">Volver al inicio</a>
    </div>
</body>
</html>
